apiVersion: apps/v1
kind: Deployment
metadata:
  name: teeswim-web
  namespace: teeswim
  labels:
    app: teeswim-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teeswim-web
  template:
    metadata:
      labels:
        app: teeswim-web
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: teeswim-web
          image: ghcr.io/akaich00/teeswim-web:37d1884
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.teeswim.com/v1"
            # Shopify runtime env vars (used by API routes)
            - name: SHOPIFY_STORE_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_STORE_DOMAIN
            - name: SHOPIFY_STOREFRONT_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_STOREFRONT_ACCESS_TOKEN
            # Mockup service internal URL
            - name: RUST_MOCKUP_SERVICE_URL
              value: "http://teeswim-mockup:8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
