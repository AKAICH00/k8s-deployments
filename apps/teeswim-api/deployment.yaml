apiVersion: apps/v1
kind: Deployment
metadata:
  name: teeswim-api
  namespace: teeswim
  labels:
    app: teeswim-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teeswim-api
  template:
    metadata:
      labels:
        app: teeswim-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: teeswim-api
          image: ghcr.io/akaich00/teeswim-api:ae46f9a
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: JWT_SECRET
            - name: FAL_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: FAL_AI_API_KEY
            - name: SHOPIFY_ADMIN_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_ADMIN_ACCESS_TOKEN
            - name: SHOPIFY_STOREFRONT_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_STOREFRONT_ACCESS_TOKEN
            - name: SHOPIFY_STORE_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_STORE_DOMAIN
            - name: GELATO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: GELATO_API_KEY
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: CLOUDINARY_API_SECRET
            - name: DUB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: DUB_API_KEY
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: GOOGLE_API_KEY
            - name: KIE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kie-secret
                  key: KIE_API_KEY
            - name: R2_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: R2_ACCOUNT_ID
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: R2_SECRET_ACCESS_KEY
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: R2_BUCKET_NAME
            - name: R2_PUBLIC_URL
              value: "https://assets.teeswim.com"
            - name: RUST_MOCKUP_SERVICE_URL
              value: "http://teeswim-mockup:8080"
            # Shopify Customer Account API (Headless Auth)
            - name: SHOPIFY_CUSTOMER_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_CUSTOMER_CLIENT_ID
            - name: SHOPIFY_CUSTOMER_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_CUSTOMER_AUTH_URL
            - name: SHOPIFY_CUSTOMER_TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_CUSTOMER_TOKEN_URL
            - name: SHOPIFY_CUSTOMER_LOGOUT_URL
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_CUSTOMER_LOGOUT_URL
            - name: SHOPIFY_HEADLESS_STOREFRONT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_HEADLESS_STOREFRONT_TOKEN
            - name: SHOPIFY_HEADLESS_PRIVATE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_HEADLESS_PRIVATE_TOKEN
            - name: ALLOWED_ORIGINS
              value: "https://www.teeswim.com,https://teeswim.com,https://app.teeswim.com,http://localhost:3001,http://localhost:8081"
            # Google OAuth
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: GOOGLE_CLIENT_SECRET
            # Apple OAuth
            - name: APPLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: APPLE_CLIENT_ID
            - name: APPLE_TEAM_ID
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: APPLE_TEAM_ID
            - name: APPLE_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: APPLE_KEY_ID
            - name: APPLE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: APPLE_PRIVATE_KEY
            # Resend Email
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: RESEND_API_KEY
            - name: RESEND_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: RESEND_FROM_EMAIL
            # Shopify OAuth (additional)
            - name: SHOPIFY_SHOP_ID
              valueFrom:
                secretKeyRef:
                  name: teeswim-secrets
                  key: SHOPIFY_SHOP_ID
            - name: WEB_APP_URL
              value: "https://teeswim.com"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
